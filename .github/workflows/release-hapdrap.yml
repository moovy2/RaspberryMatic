# OpenCCU HAP/DRAP-Helper HA-App Release build
# yamllint disable rule:truthy
---
name: Release Build (HAP/DRAP-Helper HA-App)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-24.04
    name: Build HAP/DRAP-Helper HA-App
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@f4ca6f671bd429efb108c0f2fa0ae8af0215986c  # master
        with:
          path: "./home-assistant-addon-hapdrap"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
        with:
          use: true

      - name: Login to GitHub Container Registry
        if: env.BUILD_ARGS != '--test'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Extract docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ steps.info.outputs.image }}
          labels: |
            org.opencontainers.image.title=OpenCCU HAP/DRAP-Helper HA-App
            org.opencontainers.image.description=OpenCCU Helper App for HmIP-HAP / HmIPW-DRAP connectivity
            org.opencontainers.image.vendor=OpenCCU OpenSource Project
            org.opencontainers.image.authors=OpenCCU OpenSource Team
            org.opencontainers.image.version=${{ steps.info.outputs.version }}
            org.opencontainers.image.url=https://openccu.de
          annotations: |
            org.opencontainers.image.title=OpenCCU HAP/DRAP-Helper HA-App
            org.opencontainers.image.description=OpenCCU Helper App for HmIP-HAP / HmIPW-DRAP connectivity
            org.opencontainers.image.vendor=OpenCCU OpenSource Project
            org.opencontainers.image.authors=OpenCCU OpenSource Team
            org.opencontainers.image.version=${{ steps.info.outputs.version }}
            org.opencontainers.image.url=https://openccu.de
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Build OCI tags
        id: extract_branch
        shell: bash
        run: |
          BASE_TAG=${{ steps.info.outputs.image }}
          UNIQUE_TAG="${BASE_TAG}:${{ steps.info.outputs.version }}"
          BRANCH="${GITHUB_REF##*/}"
          if [[ ${BRANCH} == 'master' ]]; then
            BRANCH_TAG="${BASE_TAG}:latest"
          else
            BRANCH_TAG="${BASE_TAG}:latest-${BRANCH}"
          fi
          echo "unique_tag=${UNIQUE_TAG}" >> $GITHUB_OUTPUT
          echo "branch_tag=${BRANCH_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push container image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        id: docker_build
        with:
          context: home-assistant-addon-hapdrap
          platforms: linux/amd64,linux/arm64
          push: true
          labels: |
            org.opencontainers.image.title=OpenCCU HAP/DRAP-Helper HA-App
            org.opencontainers.image.description=OpenCCU Helper App for HmIP-HAP / HmIPW-DRAP connectivity
            org.opencontainers.image.vendor=OpenCCU OpenSource Project
            org.opencontainers.image.authors=OpenCCU OpenSource Team
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.url=https://openccu.de
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/wiki
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.info.outputs.version }}
            io.hass.name=OpenCCU HAP/DRAP-Helper
            io.hass.description=OpenCCU Helper App for HmIP-HAP / HmIPW-DRAP connectivity
            io.hass.version=${{ steps.info.outputs.version }}
            io.hass.type=addon
            io.hass.arch=aarch64|amd64
          tags: |
            ${{ steps.extract_branch.outputs.unique_tag }}
            ${{ steps.extract_branch.outputs.branch_tag }}
          annotations: |
            ${{ steps.meta.outputs.annotations }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
