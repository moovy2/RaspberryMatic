# OpenCCU Dependency update automation
# yamllint disable rule:truthy
---
name: Dependency Updates

on:
  schedule:
    - cron: '0 2 * * *'  # run daily at 02:00 UTC (quiet window)
  workflow_dispatch:

concurrency:
  group: dependency-updates-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  dependency-updates:
    name: dependency-updates (${{ matrix.slug }})
    if: ${{ github.repository == 'OpenCCU/OpenCCU' }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - slug: buildroot
            script: scripts/update-buildroot.sh
            package: buildroot
            version_file: Makefile
            version_regex: '^BUILDROOT_VERSION=(.*)$'
          - slug: occu
            script: scripts/update-occu.sh
            package: occu
            version_file: buildroot-external/package/occu/occu.mk
            version_regex: '^OCCU_VERSION = (.*)$'
          - slug: qemu-guest-agent
            script: scripts/update-qemu-guest-agent.sh
            package: qemu-guest-agent
            version_file: buildroot-external/package/qemu-guest-agent/qemu-guest-agent.mk
            version_regex: '^QEMU_GUEST_AGENT_VERSION = (.*)$'
          - slug: detect-radio-module
            script: scripts/update-detect_radio_module.sh
            package: detect_radio_module
            version_file: buildroot-external/package/detect_radio_module/detect_radio_module.mk
            version_regex: '^DETECT_RADIO_MODULE_VERSION = (.*)$'
          - slug: eq3-char-loop
            script: scripts/update-eq3_char_loop.sh
            package: eq3_char_loop
            version_file: buildroot-external/package/eq3_char_loop/eq3_char_loop.mk
            version_regex: '^EQ3_CHAR_LOOP_VERSION = (.*)$'
          - slug: generic-raw-uart
            script: scripts/update-generic_raw_uart.sh
            package: generic_raw_uart
            version_file: buildroot-external/package/generic_raw_uart/generic_raw_uart.mk
            version_regex: '^GENERIC_RAW_UART_VERSION = (.*)$'
          - slug: kernel-upstream
            script: scripts/update-kernel-upstream.sh
            package: linux
            version_file: buildroot-external/configs/ova.config
            version_regex: '^BR2_LINUX_KERNEL_CUSTOM_VERSION_VALUE="([^"]+)"$'
          - slug: tailscale
            script: scripts/update-tailscale.sh
            package: tailscale-bin
            version_file: buildroot-external/package/tailscale-bin/tailscale-bin.mk
            version_regex: '^TAILSCALE_BIN_VERSION = (.*)$'
          - slug: neoserver
            script: scripts/update-neoserver.sh
            package: neoserver
            version_file: buildroot-external/package/neoserver/neoserver.mk
            version_regex: '^NEOSERVER_VERSION = (.*)$'
          - slug: codemirror
            script: scripts/update-codemirror.sh
            package: codemirror
            version_file: buildroot-external/overlay/WebUI-openccu/www/webui/js/extern/codemirror/lib/codemirror.js
            version_regex: '^  CodeMirror\.version = "([^"]+)";$'
          - slug: picod
            script: scripts/update-picod.sh
            package: picod
            version_file: buildroot-external/package/picod/picod.mk
            version_regex: '^PICOD_VERSION = (.*)$'
          - slug: raspi-fanshim
            script: scripts/update-raspi-fanshim.sh
            package: raspi-fanshim
            version_file: buildroot-external/package/raspi-fanshim/raspi-fanshim.mk
            version_regex: '^RASPI_FANSHIM_VERSION = (.*)$'
          - slug: rpi-eeprom
            script: scripts/update-rpi-eeprom.sh
            package: rpi-eeprom
            version_file: buildroot-external/package/rpi-eeprom/rpi-eeprom.mk
            version_regex: '^RPI_EEPROM_VERSION = (.*)$'
          # - slug: rpi-kernel
          #   script: scripts/update-rpi-kernel.sh
          #   package: linux-rpi
          #   version_file: buildroot-external/configs/rpi4.config
          #   version_regex: '^BR2_LINUX_KERNEL_CUSTOM_TARBALL_LOCATION="https://github\.com/raspberrypi/linux/archive/([^"]+)\.tar\.gz"$'
          # - slug: rpi-firmware
          #   script: scripts/update-rpi-firmware.sh
          #   package: rpi-firmware
          #   version_file: buildroot-external/configs/rpi4.config
          #   version_regex: '^BR2_PACKAGE_RPI_FIRMWARE_VERSION="([^"]+)"$'
          - slug: wiringpi-odroid
            script: scripts/update-wiringpi-odroid.sh
            package: wiringpi-odroid
            version_file: buildroot-external/package/wiringpi-odroid/wiringpi-odroid.mk
            version_regex: '^WIRINGPI_ODROID_VERSION = (.*)$'
          - slug: wiringpi-rpi
            script: scripts/update-wiringpi-rpi.sh
            package: wiringpi-rpi
            version_file: buildroot-external/package/wiringpi-rpi/wiringpi-rpi.mk
            version_regex: '^WIRINGPI_RPI_VERSION = (.*)$'
          - slug: daemonize
            script: scripts/update-daemonize.sh
            package: daemonize
            version_file: buildroot-external/package/daemonize/daemonize.mk
            version_regex: '^DAEMONIZE_VERSION = (.*)$'
          - slug: cloudmatic
            script: scripts/update-cloudmatic.sh
            package: cloudmatic
            version_file: buildroot-external/package/cloudmatic/cloudmatic.mk
            version_regex: '^CLOUDMATIC_VERSION = (.*)$'
          - slug: java-azul
            script: scripts/update-java-azul.sh
            package: java-azul
            version_file: buildroot-external/package/java-azul/java-azul.mk
            version_regex: '^JAVA_AZUL_VERSION = (.*)$'

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - name: Run dependency update script
        run: ./${{ matrix.script }}

      - name: Check for updated files
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >>"${GITHUB_OUTPUT}"
          else
            echo "changed=true" >>"${GITHUB_OUTPUT}"
          fi

      - name: Resolve package and version metadata
        id: metadata
        if: steps.changes.outputs.changed == 'true'
        run: |
          previous_version=$(git --no-pager show "HEAD:${{ matrix.version_file }}" \
            | sed -nE 's/${{ matrix.version_regex }}/\1/p' \
            | head -n1)
          version=$(sed -nE 's/${{ matrix.version_regex }}/\1/p' '${{ matrix.version_file }}' | head -n1)
          if [[ -z "${version}" ]]; then
            version=$(git --no-pager diff -- '${{ matrix.version_file }}' \
              | sed -nE 's/^\+[^+]*[[:space:]=]+([0-9a-f]{40})$/\1/p' \
              | head -n1)
          fi

          if [[ -z "${version}" ]]; then
            echo "::error::Failed to determine version for package '${{ matrix.package }}' from '${{ matrix.version_file }}' and fallback commit detection"
            exit 1
          fi

          if [[ -n "${previous_version}" && "${previous_version}" == "${version}" ]]; then
            echo "no_update=true" >>"${GITHUB_OUTPUT}"
            echo "Detected file changes but package version remained unchanged (${version}). Skipping PR creation."
            exit 0
          fi

          echo "package=${{ matrix.package }}" >>"${GITHUB_OUTPUT}"
          echo "version=${version}" >>"${GITHUB_OUTPUT}"
          echo "no_update=false" >>"${GITHUB_OUTPUT}"

      - name: Check for existing similar open PR
        id: duplicate
        if: steps.changes.outputs.changed == 'true' && steps.metadata.outputs.no_update != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: "chore: bump ${{ steps.metadata.outputs.package }} to ${{ steps.metadata.outputs.version }}"
        run: |
          count=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open&per_page=100" \
            | jq --arg title "${PR_TITLE}" \
                '[.[] | select(.title == $title)] | length')

          if [[ "${count}" -gt 0 ]]; then
            echo "skip=true" >>"${GITHUB_OUTPUT}"
            echo "Found existing open PR with the same change request title. Skipping PR creation."
          else
            echo "skip=false" >>"${GITHUB_OUTPUT}"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true' && steps.metadata.outputs.no_update != 'true' && steps.duplicate.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0  # v8.1.0
        with:
          token: ${{ github.token }}
          branch: automation/dependency-updates-${{ matrix.slug }}
          delete-branch: true
          commit-message: "chore: bump ${{ steps.metadata.outputs.package }} to ${{ steps.metadata.outputs.version }}"
          title: "chore: bump ${{ steps.metadata.outputs.package }} to ${{ steps.metadata.outputs.version }}"
          body: |
            Automated nightly dependency updates generated by `${{ github.workflow }}`.

            Updated component script:
            - `${{ matrix.script }}`
            - Package: `${{ steps.metadata.outputs.package }}`
            - Version: `${{ steps.metadata.outputs.version }}`
          labels: dependencies
