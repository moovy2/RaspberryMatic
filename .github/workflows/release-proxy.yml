# OpenCCU HA-Proxy Addon Release build
# yamllint disable rule:truthy
---
name: Release Build (HA Proxy-Addon)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    name: Build HA Proxy-Addon
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Get information
        id: info
        uses: home-assistant/actions/helpers/info@5f5b077d63a1e4c53019231409a0c4d791fb74e5  # master
        with:
          path: "./home-assistant-addon-proxy"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
        with:
          use: true

      - name: Login to GitHub Container Registry
        if: env.BUILD_ARGS != '--test'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ steps.info.outputs.image }}
          labels: |
            org.opencontainers.image.title=OpenCCU HA Proxy-Addon
            org.opencontainers.image.description=Proxy to externally running OpenCCU
            org.opencontainers.image.vendor=OpenCCU OpenSource Project
            org.opencontainers.image.authors=OpenCCU OpenSource Team
            org.opencontainers.image.version=${{ steps.info.outputs.version }}
            org.opencontainers.image.url=https://openccu.de
          annotations: |
            org.opencontainers.image.title=OpenCCU HA Proxy-Addon
            org.opencontainers.image.description=Proxy to externally running OpenCCU
            org.opencontainers.image.vendor=OpenCCU OpenSource Project
            org.opencontainers.image.authors=OpenCCU OpenSource Team
            org.opencontainers.image.version=${{ steps.info.outputs.version }}
            org.opencontainers.image.url=https://openccu.de
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

      - name: Build OCI tags
        id: extract_branch
        shell: bash
        run: |
          BASE_TAG=${{ steps.info.outputs.image }}
          UNIQUE_TAG="${BASE_TAG}:${{ steps.info.outputs.version }}"
          BRANCH="${GITHUB_REF##*/}"
          if [[ ${BRANCH} == 'master' ]]; then
            BRANCH_TAG="${BASE_TAG}:latest"
          else
            BRANCH_TAG="${BASE_TAG}:latest-${BRANCH}"
          fi
          echo "unique_tag=${UNIQUE_TAG}" >> $GITHUB_OUTPUT
          echo "branch_tag=${BRANCH_TAG}" >> $GITHUB_OUTPUT

      - name: Build and push container image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        id: docker_build
        with:
          context: home-assistant-addon-proxy
          platforms: linux/amd64,linux/arm64
          push: true
          labels: |
            org.opencontainers.image.title=OpenCCU HA Proxy-Addon
            org.opencontainers.image.description=Proxy to externally running OpenCCU
            org.opencontainers.image.vendor=OpenCCU OpenSource Project
            org.opencontainers.image.authors=OpenCCU OpenSource Team
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.url=https://openccu.de
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/wiki
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.info.outputs.version }}
            io.hass.name=OpenCCU (Proxy)
            io.hass.description=Proxy to externally running OpenCCU
            io.hass.url=https://github.com/${{ github.repository }}/tree/master/home-assistant-addon-proxy
            io.hass.version=${{ steps.info.outputs.version }}
            io.hass.type=addon
            io.hass.arch=aarch64|amd64
          tags: |
            ${{ steps.extract_branch.outputs.unique_tag }}
            ${{ steps.extract_branch.outputs.branch_tag }}
          annotations: |
            ${{ steps.meta.outputs.annotations }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
